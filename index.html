<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <header class="navbar">
        <div class="logo">SocialNetwork</div>
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">Messages</a>
            <a href="#">Notifications</a>
        </nav>
    </header>

    <!-- Main Container -->
    <main class="profile-container">
        
        <!-- Header Section (Cover & Avatar) -->
        <header class="profile-header">
            <div class="cover-photo"></div>
            <div class="profile-avatar-bar">
                <div class="avatar"></div>
                <div class="profile-name-details">
                    <h1>Jane Doe</h1>
                    <p>500 Friends</p>
                </div>
            </div>
        </header>

        <!-- Content Section -->
        <div class="content-layout">
            
            <!-- Sidebar (Bio / Info) -->
            <aside class="sidebar">
                <div class="card">
                    <h3>Intro</h3>
                    <p class="bio">Frontend Developer & Tech Enthusiast.</p>
                    <ul class="info-list">
                        <li>Lives in San Francisco, CA</li>
                        <li>Followed by 1,200 people</li>
                    </ul>
                </div>
            </aside>

            <!-- Feed (Posts) -->
            <section class="feed">
                <!-- Create Post Card -->
                <div class="card create-post">
                    <input type="text" placeholder="What's on your mind?">
                    <button class="btn-post">Post</button>
                </div>

                <!-- Sample Post Card -->
                <div class="card post">
                    <div class="post-header">
                        <div class="mini-avatar"></div>
                        <div>
                            <h4>Jane Doe</h4>
                            <span class="post-time">2 hours ago</span>
                        </div>
                    </div>
                    <div class="post-body">
                        <p>Just launched my new web project! Feedback is welcome.</p>
                    </div>
                    <div class="post-actions">
                        <button>Like</button>
                        <button>Comment</button>
                        <button>Share</button>
                    </div>
                </div>
            </section>

        </div>
    </main>

</body>
</html>
