<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiercebook Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">fiercebook</div>
            <div class="nav-links"><span>Profile</span></div>
        </div>
    </header>

    <main class="profile-container">
        <!-- Cover & Profile Photo Section -->
        <div class="profile-header">
            <div class="cover-container">
                <img id="cover-pic" src="cover.jpg" alt="Cover Photo">
                <label for="cover-upload" class="edit-btn">Edit Cover</label>
                <input type="file" id="cover-upload" accept="image/*" style="display: none;">
            </div>

            <div class="profile-info">
                <div class="avatar-container">
                    <img id="profile-pic" src="hazel.jpg" alt="Profile Picture">
                    <label for="profile-upload" class="edit-avatar-btn">📷</label>
                    <input type="file" id="profile-upload" accept="image/*" style="display: none;">
                </div>
                <div class="bio-section">
                    <h2 id="profile-name">Hazel</h2>
                    <a href="https://vt.tiktok.com/ZSQQUkfEY/"><img src="link.png" id="linkP"><p>Tiktok video link</p>
                    <p id="profile-bio">edit your bio</p>
                    <button id="edit-bio-btn" class="fb-btn">Edit Bio</button>
                </div>
            </div>
        </div>

        <!-- Create Post -->
        <div class="post-creator card">
            <textarea id="post-text" placeholder="What's on your mind?"></textarea>
            <input type="file" id="post-image-upload" accept="image/*">
            <button id="publish-post-btn" class="fb-btn active">Post</button>
        </div>

        <!-- Post Feed -->
        <div id="feed-container"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
